name: corebrain
description: CoreBrain — A local-first AI second brain. All processing happens on-device; no internet required.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Local database & full-text search
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # File & document handling
  file_picker: ^8.1.2
  share_plus: ^9.0.0

  # Audio recording (voice journaling)
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Image & OCR
  image_picker: ^1.1.2
  camera: ^0.11.0

  # JSON serialisation
  json_annotation: ^4.9.0

  # Markdown rendering for notes
  flutter_markdown: ^0.7.3

  # UI utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  permission_handler: ^11.3.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icons/
