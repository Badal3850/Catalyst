name: corebrain
description: CoreBrain — A local-first AI second brain. All processing happens on-device; no internet required.
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Local database & full-text search
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.4.0
  path_provider: ^2.1.5
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # File & document handling
  file_picker: ^10.3.3
  share_plus: ^12.0.1

  # Audio recording (voice journaling)
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Image & OCR
  image_picker: ^1.2.0
  camera: ^0.11.3

  # JSON serialisation
  json_annotation: ^4.9.0

  # Markdown rendering for notes
  flutter_markdown: ^0.7.3

  # UI utilities
  intl: ^0.20.2
  uuid: ^4.4.2
  permission_handler: ^12.0.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.11.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icons/
